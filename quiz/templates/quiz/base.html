<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Online Quiz Assessment System{% endblock %}</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Alpine.js -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- AOS Animation Library -->
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    
    <style>
        [x-cloak] { display: none !important; }
    </style>
    
    {% block extra_css %}{% endblock %}
</head>
<body class="bg-gray-50 min-h-screen">
    {% block content %}{% endblock %}
    
    <script>
        // Initialize with error handling
        document.addEventListener('DOMContentLoaded', function() {
            try {
                // Initialize AOS animations
                if (typeof AOS !== 'undefined') {
                    AOS.init({
                        duration: 800,
                        once: true,
                        offset: 100
                    });
                }
                
                // Initialize Lucide icons
                if (typeof lucide !== 'undefined') {
                    lucide.createIcons();
                }
            } catch (error) {
                console.warn('Animation libraries failed to load:', error);
            }
        });
        
        // Global: copy quiz code helper
        window.copyCode = function(elOrText, maybeEl) {
            let text = elOrText;
            let el = maybeEl || elOrText;
            if (typeof elOrText === 'object' && elOrText.textContent) {
                text = elOrText.textContent.trim();
                el = elOrText;
            }
            navigator.clipboard.writeText(text).then(() => {
                const origText = el.textContent;
                el.textContent = text + ' ✓';
                setTimeout(() => { el.textContent = origText; }, 1200);
            }).catch(() => { prompt('Copy:', text); });
        };
        
        // Check if Alpine loaded after 2 seconds
        setTimeout(function() {
            if (typeof Alpine === 'undefined') {
                console.warn('Alpine.js failed to load from CDN');
                // Remove x-cloak to show content anyway
                document.querySelectorAll('[x-cloak]').forEach(function(el) {
                    el.removeAttribute('x-cloak');
                    el.style.display = 'block';
                });
            }
        }, 2000);
    </script>
    
    {% block extra_js %}{% endblock %}

    <footer class="text-center text-xs text-gray-400 py-4">
        OQA System — Open Source • <a href="https://github.com" class="underline">Pro available</a>
    </footer>
</body>
</html>
